appId: com.tasktrees-electron.app
productName: TaskTrees
# 全成果物のビルド後に SHA256SUMS と GPG 署名(.asc)を生成する
afterAllArtifactBuild: scripts/sign-artifacts.cjs
directories:
  buildResources: electron/build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!ios/*'
  - '!android/*'
  - '!functions/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.electron.json}'
  - '!capacitor.config.ts'
  - '!firebase.json'
  - '!vite.config.ts'
asarUnpack:
  - resources/**
win:
  executableName: TaskTrees
  icon: resources/icon.ico
  # Azure Key Vault + AzureSignTool でコード署名（scripts/sign-win.cjs）
  # electron-builder 26 から sign / signingHashAlgorithms は signtoolOptions 配下に移動
  signtoolOptions:
    sign: scripts/sign-win.cjs
    signingHashAlgorithms:
      - sha256
nsis:
  artifactName: ${productName}-${version}-setup_win_${arch}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  include: electron/build/installer.nsh
mac:
  icon: resources/icon.icns
  entitlementsInherit: electron/build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
  target:
    - target: dmg
      arch: universal
dmg:
  artifactName: ${productName}-${version}_mac_universal.${ext}
linux:
  icon: resources
  target:
    - target: AppImage
      arch: x64
    - target: deb
      arch: x64
  maintainer: Jun Murakami <contact@bucketrelay.com>
  category: Utility
  synopsis: Tree-structured task management app
  description: TaskTrees is a tree-structured task management application.
appImage:
  # electron-builder は AppImage の ${arch} を x86_64 に解決するため、deb と
  # 表記を揃える目的で amd64 をハードコードする（linux ターゲットは x64 のみ）。
  artifactName: ${productName}-${version}_linux_amd64.${ext}
deb:
  artifactName: ${productName}-${version}_linux_${arch}.${ext}
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
